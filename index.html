<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        .instagram-logo { font-family: 'Billabong', cursive; font-size: 2.5rem; }
        .post-image { aspect-ratio: 1 / 1; object-fit: cover; }
    </style>
</head>
<body class="bg-black text-white">

    <!-- Top Navigation -->
    <nav class="fixed top-0 w-full bg-black border-b border-gray-800 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <!-- Logo -->
                <h1 class="instagram-logo text-3xl font-light tracking-wider cursor-pointer">Instagram</h1>
                
                <!-- Search -->
                <div class="hidden md:flex items-center bg-zinc-900 rounded-xl px-4 py-2 w-80">
                    <i class="fa-solid fa-magnifying-glass text-gray-500"></i>
                    <input type="text" placeholder="Search" 
                           class="bg-transparent outline-none ml-3 text-sm w-full">
                </div>
            </div>

            <!-- Navigation Icons -->
            <div class="flex items-center gap-6 text-2xl">
                <i class="fa-solid fa-house cursor-pointer hover:text-gray-400"></i>
                <i class="fa-solid fa-magnifying-glass md:hidden cursor-pointer"></i>
                <i class="fa-regular fa-compass cursor-pointer hover:text-gray-400"></i>
                <i class="fa-solid fa-film cursor-pointer hover:text-gray-400"></i>
                <i class="fa-regular fa-heart cursor-pointer hover:text-gray-400"></i>
                <i class="fa-regular fa-paper-plane cursor-pointer hover:text-gray-400"></i>
                
                <!-- Create Post -->
                <i onclick="alert('Create post clicked!')" 
                   class="fa-regular fa-square-plus cursor-pointer hover:text-gray-400"></i>
                
                <!-- Profile -->
                <img src="https://i.pravatar.cc/32" 
                     class="w-8 h-8 rounded-full object-cover cursor-pointer border-2 border-white">
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto flex pt-16">
        
        <!-- Main Feed -->
        <div class="flex-1 max-w-xl mx-auto px-4 py-8">
            
            <!-- Stories -->
            <div class="flex gap-6 overflow-x-auto pb-6 border-b border-gray-800 mb-8">
                <div class="text-center flex-shrink-0">
                    <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-pink-500 via-red-500 to-yellow-500 p-0.5">
                        <img src="https://i.pravatar.cc/150?img=1" class="w-full h-full rounded-full object-cover border-2 border-black">
                    </div>
                    <p class="text-xs mt-1">Your story</p>
                </div>
                <!-- Add more stories as needed -->
                <div class="text-center flex-shrink-0">
                    <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-pink-500 via-red-500 to-yellow-500 p-0.5">
                        <img src="https://i.pravatar.cc/150?img=2" class="w-full h-full rounded-full object-cover border-2 border-black">
                    </div>
                    <p class="text-xs mt-1">sarah</p>
                </div>
            </div>

            <!-- Post 1 -->
            <div class="mb-12">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <img src="https://i.pravatar.cc/150?img=3" class="w-9 h-9 rounded-full">
                        <div>
                            <p class="font-semibold text-sm">natgeo</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-ellipsis cursor-pointer"></i>
                </div>
                
                <img src="https://picsum.photos/id/1015/600/600" 
                     class="post-image w-full rounded-xl" alt="post">
                
                <div class="flex gap-6 text-3xl mt-4">
                    <i class="fa-regular fa-heart hover:text-red-500 cursor-pointer"></i>
                    <i class="fa-regular fa-comment cursor-pointer"></i>
                    <i class="fa-regular fa-paper-plane cursor-pointer"></i>
                </div>
                
                <p class="mt-3"><span class="font-semibold">natgeo</span> Beautiful sunrise in the mountains 🌄</p>
                <p class="text-gray-400 text-sm mt-1">View all 1,234 comments</p>
            </div>

            <!-- Post 2 -->
            <div class="mb-12">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <img src="https://i.pravatar.cc/150?img=67" class="w-9 h-9 rounded-full">
                        <div>
                            <p class="font-semibold text-sm">travelwithme</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-ellipsis cursor-pointer"></i>
                </div>
                
                <img src="https://picsum.photos/id/1016/600/600" 
                     class="post-image w-full rounded-xl" alt="post">
                
                <div class="flex gap-6 text-3xl mt-4">
                    <i class="fa-solid fa-heart text-red-500 cursor-pointer"></i>
                    <i class="fa-regular fa-comment cursor-pointer"></i>
                    <i class="fa-regular fa-paper-plane cursor-pointer"></i>
                </div>
                
                <p class="mt-3"><span class="font-semibold">travelwithme</span> Paradise found 🏝️</p>
            </div>

        </div>

        <!-- Right Sidebar -->
        <div class="hidden lg:block w-80 pt-8 pr-8">
            <div class="flex items-center gap-3 mb-6">
                <img src="https://i.pravatar.cc/150?img=68" class="w-14 h-14 rounded-full">
                <div class="flex-1">
                    <p class="font-semibold">yourusername</p>
                    <p class="text-gray-400 text-sm">Kendra • Lagos</p>
                </div>
                <button class="text-blue-500 font-semibold text-sm">Switch</button>
            </div>

            <p class="text-gray-400 text-sm font-semibold mb-3">Suggested for you</p>
            
            <!-- Suggestions -->
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img src="https://i.pravatar.cc/150?img=44" class="w-9 h-9 rounded-full">
                        <div>
                            <p class="text-sm font-semibold">cristiano</p>
                            <p class="text-xs text-gray-400">Followed by natgeo</p>
                        </div>
                    </div>
                    <button class="text-blue-500 font-semibold text-sm">Follow</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
